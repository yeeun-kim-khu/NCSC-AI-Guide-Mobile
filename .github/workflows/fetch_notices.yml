name: Fetch Notices Cache

on:
  schedule:
    - cron: "0 * * * *"   # 매 1시간마다 (UTC 기준)
  workflow_dispatch:        # 수동 실행 가능

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4 urllib3

      - name: Fetch notices
        run: python scripts/fetch_notices.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/notices_cache.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update notices_cache.json [skip ci]"
            git push
          fi
